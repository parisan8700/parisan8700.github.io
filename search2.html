<!DOCTYPE html>
<html>

<head>
 <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: sans-serif;
            background-color: red;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .input {
            border: none;
            border-radius: 35px;
            outline: none;
            width: 100%;
            height: 100%;
            font-size: large;
        }

        .search-content {
            box-shadow: 0px 11px 25px rgba(0, 0, 0, 0.3);
            background-color: white;
            height: 50px;
            border-radius: 30px;
            margin: 0 auto;
            position: relative;
            padding: 11px;
            max-width: 50px;
        }

        label {
            color: red;
            background-color: #fff;
            top: 0px;
            right: 23px;
            position: absolute;
            width: 50px;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: -23px;
            border-radius: 25px;
            
        }
        #check:checked ~ .search-content{
            max-width: 300px;
            transition: all 0.3s ease;
        }
        #check:checked ~ .search-content label{
            background-color: red;
            color: black;
            border-radius: 0 25px 25px 0;
        }
        #check:checked ~ .search-content .input{
            padding: 0px 30px;
        }
    </style>
</head>

<body>

    <div class="search">
        <input type="checkbox" id="check" hidden>
        <div class="search-content">
            <input type="text" placeholder="type here..." class="input">
            <label for="check">
                <i class="fa fa-search"></i>
            </label>
        </div>

</body>

</html>
