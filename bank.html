<!DOCTYPE html>
<html>

<head>

    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #1c1c25;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        section {
            background-image: linear-gradient(#f715ab 30%, #0c82e3);
            width: 380px;
            height: 380px;
            border-radius: 100%;

        }

        .content {
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Times New Roman', Times, serif;
        }

        .cart {
            width: 375px;
            height: 180px;
            margin-top: 93px;
            margin-left: -30px;
            border-radius: 15px;
            background: rgb(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
            display: grid;
            transition: all 0.3s ease-out;
            
        }

        h3 {
            margin-top: 15px;
            margin-left: 300px;
            font-size: x-large;
            font-weight: 900;
            color: white;
        }
        img{
            width: 40px;
            height: 40px;
            margin-left: 20px;
        }
        p{
            margin-left: 20px;
            font-size: x-large;
            font-weight: 600;
            color: #fff;
        }
        .info{
            display: flex;
            justify-content: space-between;
            margin: 0px 20px;
            color: #fff;
        }
        .cart:hover{
            margin-top: 55px;
            transform: translateY(-10px);
            
        }
    </style>
</head>

<body>

    <div class="content">
        <section>
            <div class="cricle"></div>
            <div class="cart">
                <h3>VISA</h3>
                <img src="./icon-2.png">
                <p>6043 5647 5976 2651</p>
                <div class="info">
                    <span>Parisan Ghlami</span>
                    <span>05/23</span>
                </div>
            </div>
        </section>
    </div>
</body>

</html>
