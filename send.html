<!DOCTYPE html>
<html>
    <head>

        <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.7.0/css/all.css" integrity="sha384-lZN37f5QGtY3VHgisS14W3ExzMWZxybE1SJSEsQp9S+oqd12jhcu+A56Ebc1zFSJ" crossorigin="anonymous">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <style>
            *{
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body{
                background-color: rgb(35, 248, 248);
                font-family: sans-serif;
                height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            .container{
                background-color: #fff;
                max-width: 1100px;
                width: 834px;
                height: 400px;
                border-radius: 6px;
                box-shadow: 0 5px 10px rgba(0, 0, 0, 0.2);

            }
            .content{
                display: grid;
                grid-template-columns: 268px 565px;
            }
            .left-content{
                display: grid;
                justify-content: center;
                gap: 4rem;
                padding: 31px 0px;
                position: relative;
            }
            .left-content::before{
                content: "";
                background-color: #afafb6;
                width: 2px;
                height: 70%;
                position: absolute;
                right: 5px;
                top:50%;
                transform: translateY(-50%);
            
            }
            
            .i{
                display: flex;
                justify-content: center;
                color: #3e2093;
            }
            p{
                display: flex;
                justify-content: center;
                color: #afafb6;
            }
            .p1{
                font-weight: bold;
                color: black;
            }
            .right-content{
                padding: 31px 41px;
                display: grid;
                gap: .8rem;
            }
            h2{
                color: #3e2093;
            }
            .p2{
                color: black;
            }
            input{
                background-color: #dcdce7;
                border: none;
                border-radius: 8px;
            }
            textarea{
                background-color: #dcdce7;
                border: none;
                border-radius: 8px;
            }
            button{
                background-color: #3e2093;
                border: none;
                border-radius: 8px;
                margin-right: 378px;
                color: #fff;
            }

            @media screen and (max-width:425px){
                .left-content{background: white;
                    display: flex;
                    gap: 1.5rem;
                    }
                .content{display: flex;
                    flex-direction: column-reverse;}
                .left-content::before{display: none;}
                input{padding: 12px 0px;
                      border: none;}
                textarea{padding: 12px 0px;
                      border: none;}
                button{margin-right: 271px;
                    font-size: small;
                    padding: 5px;}
            }
            @media screen and (max-width:375px){
                button{margin-right: 222px;}
                .left-content{gap: 1rem;
                 font-size: small;}
            }

           

        </style>
    </head>
    <body>

        <div class="container">
            <div class="content">
                <div class="left-content">
                    <div class="one">
                        <i class="fas fa-user i"></i>
                        <p class="p1">Address</p>
                        <p>iran-nhi12</p>
                        <p>mashhad-k015</p>
                    </div>
                    <div class="tow">
                        <i class="fas fa-phone i"></i>
                        <p class="p1">Phone</p>
                        <p>+0098768436</p>
                        <p>+0078648791</p>
                    </div>
                    <div class="three">
                        <i class="fas fa-envelope i"></i>
                        <p class="p1">Email</p>
                        <p>parisan@gmail.com</p>
                        <p>samannn@gmaill.com</p>
                    </div>
                </div>
                <div class="right-content">
                    <h2>Send us a message</h2>
                    <p class="p2">if you send masasage can send your Lorem ipsum dolor sit amet consectetur adipisicing elit.
                    architecto nesciunt nobis accusantium!</p>
                    <input type="text" name="text" placeholder="    Enter your name">
                    <input type="email" name="email" placeholder="   Enter your email">
                    <textarea name="text" placeholder=" Enter your message"></textarea>
                    <button>Send Now</button>
                </div>
            </div>
        </div>

    </body>
</html>
