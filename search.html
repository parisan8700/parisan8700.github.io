<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #e1effc;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        input:active,input:focus{
            outline: 0;
        }

        input {
            width: 260px;
            height: 45px;
            border-radius: 30px;
            padding-left: 10px;
            border: none;
            background-color: #e1effc;
            box-shadow: inset 5px 5px 7px #c8d0e7, inset -2px -2px 3px #fff;
            font-size: large;
            position: relative;
        }
        

        button {
            position: absolute;
            right: 537px;
            bottom: 309px;
            color: white;
            border: none;
            background: purple;
            width: 35px;
            height: 35px;
            border-radius: 50px;
            box-shadow: 2px 6px 28px purple;
        }
    </style>
</head>

<body>

    <div class="content">
        <input type="text" placeholder="search">
        <button>
            <i class="fa fa-search"></i>
        </button>
    </div>
</body>

</html>
