<!DOCTYPE html>
<html dir="rtl">
  <head>
    <link
      href="https://cdn.jsdelivr.net/gh/rastikerdar/vazir-font@v27.1.0/dist/font-face.css"
      rel="stylesheet"
      type="text/css"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }
      ul {
        list-style-type: none;
      }
      a {
        text-decoration: none;
      }
      .header-site {
        background: url(image.jpg);
        background-size: cover;
        background-repeat: no-repeat;
        background-position: center;
        min-height: 100vh;
        position: relative;
      }
      .header-site::before {
        content: "";
        position: absolute;
        top: 0;
        right: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image: linear-gradient(
          to right,
          rgba(0, 0, 0, 0.7) 50%,
          rgba(233, 233, 233, 0.4)
        );
      }
      .container {
        position: relative;
        margin: 0px 267px;
        padding-top: 4rem;
      }
      .nvagation {
        background: rgb(255, 255, 255, 0.3);
        backdrop-filter: blur(30px);
        border-radius: 20px;
        display: flex;
        justify-content: center;
        gap: 3rem;
      }
      .nvagation > li {
        padding: 18px 10px;
      }
      a {
        color: #fff;
        font-weight: bold;
        font-family: vazir;
      }
      .nvagation > li::after {
        content: "";
        display: block;
        border-bottom: 3px solid red;
        transform: scaleX(0);
        transition: transform 250ms ease-in-out;
      }
      .nvagation > li:hover::after {
        transform: scaleX(1);
      }
      .icon::before {
        content: "";
        border-bottom: 2px solid #fff;
        height: 7px;
        display: block;
        border-right: 2px solid #fff;
        width: 7px;
        position: absolute;
        right: 105%;
        top: 43%;
        transform: rotate(42deg);
        transition: transform 0.15s ease-in-out;
      }
      .icon:hover::before {
        transform: rotate(218deg);
      }
      .icon {
        position: relative;
      }
      .sub {
        position: absolute;
        border-radius: 20px;
        min-width: 200px;
        top: 57px;
        right: -58px;
        background: rgb(255, 255, 255, 0.3);
        backdrop-filter: blur(30px);
        padding: 10px;
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
        transition: opacity 0.15s ease-in-out;
      }
      .control:hover > .sub {
        opacity: 1;
        pointer-events: visible;
        visibility: visible;
      }
      ul.sub li a {
        display: block;
        border-radius: 12px;
        transition: all 0.12s ease-in-out;
      }
      ul.sub li a:hover {
        background-color: #fff;
        color: black;
      }
      .left {
        right: 189px;
        top: 30px;
      }
    </style>
  </head>

  <body>
    <header class="header-site">
      <div class="container">
        <ul class="nvagation">
          <li>
            <a href="#">خانه</a>
          </li>
          <li class="icon control">
            <a href="#">محصولات</a>
            <ul class="sub">
              <li>
                <a href="#">لباس</a>
              </li>
              <li class="control">
                <a href="#">عطر</a>
                <ul class="sub left">
                  <li><a href="#">عطر1</a></li>
                  <li class="control">
                    <a href="#">عطر2</a>
                    <ul class="sub left">
                      <li><a href="#">test</a></li>
                      <li><a href="#">test</a></li>
                      <li><a href="#">test</a></li>
                      <li><a href="#">test</a></li>
                    </ul>
                  </li>
                  <li><a href="#">عطر3</a></li>
                </ul>
              </li>
              <li>
                <a href="#">موبایل</a>
              </li>
            </ul>
          </li>
          <li>
            <a href="#">مقالات</a>
          </li>
          <li>
            <a href="#">درباره ما</a>
          </li>
          <li>
            <a href="#">تماس با ما</a>
          </li>
        </ul>
      </div>
    </header>
  </body>
</html>
